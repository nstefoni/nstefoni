name = "jitterscope"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-01"

[build]
command = "worker-build --release"

[[kv_namespaces]]
binding = "VIEWS"
id = "780323dcac594c1b9d4541fe0e7aa390"

[durable_objects]
bindings = [{ name = "MESH", class_name = "RegionProbe" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RegionProbe"]
