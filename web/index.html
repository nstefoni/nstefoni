<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NICOLAS STEFONI · JITTERSCOPE</title>
<meta name="description" content="Network early-warning station — your connection, measured and recorded live."/>
<link rel="stylesheet" href="theme.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{font-family:ui-monospace,'SF Mono','Cascadia Mono','JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace;color:var(--ink)}
canvas#c{position:fixed;inset:0;display:block;cursor:grab}
canvas#c:active{cursor:grabbing}
#vig{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse at 50% 42%, transparent 55%, rgba(0,0,0,0.55) 100%)}
.ui{position:fixed;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:28px 36px;pointer-events:none;z-index:2}
.ui.top{top:0}.ui.bot{bottom:0;align-items:flex-end}
.lockup .name{font-size:clamp(18px,3.2vw,30px);font-weight:500;letter-spacing:.45em;white-space:nowrap}
.lockup .sub{font-size:10px;letter-spacing:.3em;color:var(--dim);margin-top:8px;min-height:14px}
.ent{text-align:right}
.ent .lab{font-size:10px;letter-spacing:.3em;color:var(--dim)}
.ent .bar{width:140px;height:6px;border:1px solid var(--hair);margin:8px 0 6px auto}
.ent .fill{height:100%;width:4%;background:var(--acc);transition:width .4s steps(6)}
.ent .val{font-size:12px;color:var(--acc)}
.stats{font-size:10px;letter-spacing:.18em;color:var(--dim);line-height:2.1;max-width:62vw}
.stats b{color:var(--ink);font-weight:500}
#events{color:var(--dim);font-size:9px;letter-spacing:.15em;line-height:1.9}
#tag{color:var(--acc);margin-bottom:2px}
.right{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.gh{pointer-events:auto;font-size:10px;letter-spacing:.3em;color:var(--dim);text-decoration:none;border:1px solid var(--hair);padding:10px 16px;white-space:nowrap}
.gh:hover{color:var(--ink);border-color:var(--ink)}
.hint{font-size:9px;letter-spacing:.25em;color:var(--dim);white-space:nowrap}
.cur{display:inline-block;width:6px;height:11px;background:var(--acc);vertical-align:-1px;animation:bl 1.15s steps(2,jump-none) infinite}
@keyframes bl{50%{opacity:0}}
.tlwrap{position:fixed;left:36px;right:36px;bottom:118px;z-index:2;pointer-events:none}
.corner{position:fixed;width:22px;height:22px;border:1px solid var(--hair);z-index:2}
.c1{top:14px;left:14px;border-right:0;border-bottom:0}.c2{top:14px;right:14px;border-left:0;border-bottom:0}
.c3{bottom:14px;right:14px;border-left:0;border-top:0}.c4{bottom:14px;left:14px;border-right:0;border-top:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vig"></div>
<div class="corner c1"></div><div class="corner c2"></div><div class="corner c3"></div><div class="corner c4"></div>
<div class="ui top">
  <div class="lockup">
    <div class="name">NICOLAS STEFONI</div>
    <div class="sub"><span id="boot">INITIALIZING JITTERSCOPE STATION 01</span> <span class="cur"></span></div>
  </div>
  <div class="ent">
    <div class="lab">SHANNON ENTROPY</div>
    <div class="bar"><div class="fill" id="efill"></div></div>
    <div class="val" id="eval">.00</div>
  </div>
</div>
<div class="ui bot">
  <div class="stats">
    <div id="events"></div>
    <div id="tag">● WARMING UP PROBES…</div>
    <div id="stats">&nbsp;</div>
  </div>
  <div class="right">
    <div class="hint">DRAG = ORBIT · SCROLL = ZOOM · CLICK THE CONSOLE</div>
    <a class="gh" href="https://github.com/nstefoni">GITHUB ↗</a>
  </div>
</div>
<div class="tlwrap">
  <div style="font-size:9px;letter-spacing:.3em;color:var(--dim);margin-bottom:5px">ENTROPY TRACE · FULL HISTORY · PERSISTS ACROSS VISITS</div>
  <canvas id="tl" style="width:100%;height:54px;display:block;opacity:.95"></canvas>
</div>
<script type="module">
import * as THREE from "https://esm.sh/three@0.160.0";

const css = (v) => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const COL = { bg: css("--bg"), ink: css("--ink"), dim: css("--dim"), acc: css("--acc"), alert: css("--alert"), warn: css("--warn") };
const CH = ["#c8f04c", "#54d8e0", "#b48cff", "#6aa6ff"];

const PROBES = [
  { name: "GH",  url: "https://api.github.com/", mode: "cors" },
  { name: "NPM", url: "https://registry.npmjs.org/-/ping", mode: "no-cors" },
  { name: "CDN", url: "https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js", mode: "cors" },
  { name: "VRC", url: "https://vercel.com/favicon.ico", mode: "no-cors" },
];
const stat = PROBES.map(() => ({ p50: 40, jit: 0, attempts: 0, fails: 0, win: [], lastLost: false }));
let entropy = 0.05;

// console state: channel toggles, probe rate, fault simulation
const ctl = {
  on: [true, true, true, true],
  rate: 1,
  rates: [2000, 900, 380],
  rateNames: ["SLOW", "NORM", "FAST"],
  simUntil: 0,
};
const simActive = () => Date.now() < ctl.simUntil;

const CAP = 1600;
let track = [];
try { track = JSON.parse(localStorage.getItem("js_track") || "[]"); if (!Array.isArray(track)) track = []; } catch {}
let events = [];
try { events = JSON.parse(localStorage.getItem("js_events") || "[]"); } catch {}

function appendRound(vals) {
  const t = Date.now();
  const prev = track[track.length - 1];
  let u = 0, gap = false;
  if (prev) {
    const dt = (t - prev.t) / 1000;
    gap = dt > 60;
    u = prev.u + Math.min(dt, 10) + (gap ? 14 : 0);
  }
  track.push({ t, u, vals, e: +entropy.toFixed(3), gap });
  if (track.length > CAP) track = track.slice(-CAP);
  try { localStorage.setItem("js_track", JSON.stringify(track)); } catch {}
}

async function probe(i) {
  const p = PROBES[i];
  const t0 = performance.now();
  stat[i].attempts++;
  try {
    const ac = new AbortController();
    const to = setTimeout(() => ac.abort(), 4000);
    await fetch(p.url + (p.url.includes("?") ? "&" : "?") + "t=" + Math.random(), { mode: p.mode, cache: "no-store", signal: ac.signal });
    clearTimeout(to);
    stat[i].lastLost = false;
    return performance.now() - t0;
  } catch { stat[i].fails++; stat[i].lastLost = true; return null; }
}
function feed(i, v) {
  if (v == null) return;
  const w = stat[i].win;
  w.push(v); if (w.length > 60) w.shift();
  const s = [...w].sort((a, b) => a - b);
  stat[i].p50 = s[Math.floor(s.length / 2)];
  let J = 0;
  for (let k = 1; k < w.length; k++) J += (Math.abs(w[k] - w[k - 1]) - J) / 16;
  stat[i].jit = J;
}
const lossOf = (i) => (ctl.on[i] && stat[i].attempts > 3 ? stat[i].fails / stat[i].attempts : 0);

const BINS = 12;
function shannonHist(values, k = BINS) {
  const hist = new Array(k).fill(0);
  if (values.length < 8) return { h: 0, hist };
  const s = [...values].sort((a, b) => a - b);
  const p50 = s[Math.floor(s.length / 2)];
  const lo = p50 * 0.6, hi = p50 * 1.8;
  if (hi - lo < 1e-9) return { h: 0, hist };
  for (const v of values) {
    const c = Math.min(hi, Math.max(lo, v));
    hist[Math.floor(((c - lo) / (hi - lo)) * (k - 1e-9))]++;
  }
  let h = 0;
  for (const c of hist) if (c) { const p = c / values.length; h -= p * Math.log2(p); }
  return { h: h / Math.log2(k), hist };
}
const recent = [];
let liveHist = new Array(BINS).fill(0);
let lastZone = 0;
const zoneOf = (e) => (e > 0.62 ? 2 : e > 0.4 ? 1 : 0);
const zoneCol = (z) => (z === 2 ? COL.alert : z === 1 ? COL.warn : COL.acc);
const hhmm = (t) => new Date(t).toTimeString().slice(0, 8);

let dirty = true;
(async function loop() {
  for (;;) {
    const vals = [];
    for (let i = 0; i < PROBES.length; i++) {
      if (!ctl.on[i]) { vals.push(-1); continue; }
      let v = await probe(i);
      // fault injection: corrupt the measurement so the whole pipeline reacts
      if (v != null && simActive()) {
        v = v * (0.6 + Math.random() * 1.7) + (Math.random() < 0.18 ? v * 2.2 : 0);
        if (Math.random() < 0.1) v = null;
      }
      feed(i, v);
      if (v != null && stat[i].p50 > 0) { recent.push(v / stat[i].p50); if (recent.length > 96) recent.shift(); }
      vals.push(v == null ? null : Math.round(v));
      await new Promise((ok) => setTimeout(ok, 90));
    }
    const { h, hist } = shannonHist(recent);
    liveHist = hist;
    const nOn = ctl.on.filter(Boolean).length || 1;
    const loss = PROBES.reduce((a, _, k) => a + lossOf(k), 0) / nOn;
    entropy += (Math.min(1, h * 0.85 + loss * 1.2) - entropy) * 0.1;
    if (stat.reduce((a, s) => a + s.attempts, 0) >= 8) {
      appendRound(vals);
      const z = zoneOf(entropy);
      if (z !== lastZone) {
        events.unshift({ t: Date.now(), z, e: +entropy.toFixed(2) });
        events = events.slice(0, 30);
        try { localStorage.setItem("js_events", JSON.stringify(events)); } catch {}
        lastZone = z;
      }
      dirty = true;
    }
    ui(); drawTrace();
    await new Promise((ok) => setTimeout(ok, ctl.rates[ctl.rate]));
  }
})();

function ui() {
  const e = document.getElementById("efill"), v = document.getElementById("eval"), tag = document.getElementById("tag");
  const col = zoneCol(zoneOf(entropy));
  e.style.width = Math.max(3, entropy * 100) + "%"; e.style.background = col;
  v.textContent = entropy.toFixed(2).slice(1); v.style.color = col;
  const warm = stat.reduce((a, s) => a + s.attempts, 0) < 8;
  tag.textContent = warm ? "● WARMING UP PROBES…" :
    simActive() ? "⚠ FAULT INJECTION — SIMULATED DEGRADATION" :
    entropy > 0.62 ? "▲ HIGH ENTROPY — DEGRADATION LIKELY" :
    entropy > 0.4 ? "◆ ENTROPY RISING" : "● ALL SIGNALS NOMINAL";
  tag.style.color = warm ? COL.dim : simActive() ? COL.warn : col;
  document.getElementById("stats").innerHTML = PROBES.map((p, i) =>
    ctl.on[i]
      ? `<span style="color:${CH[i]}">${p.name}</span> <b>${stat[i].win.length ? stat[i].p50.toFixed(0) + "ms" : "··"}</b> ±${stat[i].jit.toFixed(1)}`
      : `<span style="color:${CH[i]};opacity:.4">${p.name}</span> <span style="opacity:.5">OFF</span>`
  ).join(" &nbsp;·&nbsp; ") + ` &nbsp;·&nbsp; LOSS <b>${(PROBES.reduce((a, _, k) => a + lossOf(k), 0) / (ctl.on.filter(Boolean).length || 1) * 100).toFixed(0)}%</b> &nbsp;·&nbsp; RATE <b>${ctl.rateNames[ctl.rate]}</b>`;
  document.getElementById("events").innerHTML = events.slice(0, 4).map((ev) =>
    `${hhmm(ev.t)} ${ev.z === 2 ? "▲" : ev.z === 1 ? "◆" : "●"} H ${String(ev.e).slice(1)}`
  ).join("<br/>");
}

const tl = document.getElementById("tl");
const tx = tl.getContext("2d");
function drawTrace() {
  const r = tl.getBoundingClientRect();
  const d = Math.min(devicePixelRatio || 1, 2);
  if (tl.width !== Math.round(r.width * d)) { tl.width = Math.round(r.width * d); tl.height = 54 * d; }
  tx.setTransform(d, 0, 0, d, 0, 0);
  const w = r.width, h = 54;
  tx.clearRect(0, 0, w, h);
  const y4 = (e) => h - 4 - e * (h - 8);
  tx.fillStyle = "rgba(255,84,73,0.06)"; tx.fillRect(0, 0, w, y4(0.62));
  tx.fillStyle = "rgba(255,194,51,0.05)"; tx.fillRect(0, y4(0.62), w, y4(0.4) - y4(0.62));
  [0.4, 0.62].forEach((th) => {
    tx.strokeStyle = "rgba(233,237,226,0.12)"; tx.setLineDash([2, 4]);
    tx.beginPath(); tx.moveTo(0, y4(th)); tx.lineTo(w, y4(th)); tx.stroke(); tx.setLineDash([]);
  });
  if (track.length < 2) return;
  const u0 = track[0].u, u1 = track[track.length - 1].u || 1;
  const x4 = (u) => ((u - u0) / Math.max(1, u1 - u0)) * w;
  for (let i = 1; i < track.length; i++) {
    if (track[i].gap) continue;
    tx.strokeStyle = zoneCol(zoneOf(track[i].e));
    tx.lineWidth = 1.2;
    tx.beginPath(); tx.moveTo(x4(track[i - 1].u), y4(track[i - 1].e)); tx.lineTo(x4(track[i].u), y4(track[i].e)); tx.stroke();
  }
}
drawTrace();

// ================= 3D CONSOLE =================
const cv = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
renderer.setClearColor(new THREE.Color(COL.bg), 1);
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(new THREE.Color(COL.bg), 140, 380);
const cam = new THREE.PerspectiveCamera(40, 1, 0.1, 800);

let composer = null, bloomPass = null, reflector = null;
try {
  const [{ EffectComposer }, { RenderPass }, { UnrealBloomPass }, { Reflector }] = await Promise.all([
    import("https://esm.sh/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js"),
    import("https://esm.sh/three@0.160.0/examples/jsm/postprocessing/RenderPass.js"),
    import("https://esm.sh/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js"),
    import("https://esm.sh/three@0.160.0/examples/jsm/objects/Reflector.js"),
  ]);
  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, cam));
  bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.45, 0.8, 0.34);
  composer.addPass(bloomPass);
  reflector = new Reflector(new THREE.PlaneGeometry(116, 56), {
    textureWidth: 1024, textureHeight: 1024, color: 0x2a2f34,
  });
  reflector.rotation.x = -Math.PI / 2;
  reflector.position.y = -13.62;
  scene.add(reflector);
} catch { composer = null; reflector = null; }

const hairMat = () => new THREE.LineBasicMaterial({ color: new THREE.Color(COL.dim), transparent: true, opacity: 0.45 });
const faintMat = () => new THREE.LineBasicMaterial({ color: new THREE.Color(COL.dim), transparent: true, opacity: 0.16 });

function frameRect(w, h) {
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-w / 2, -h / 2, 0), new THREE.Vector3(w / 2, -h / 2, 0),
    new THREE.Vector3(w / 2, h / 2, 0), new THREE.Vector3(-w / 2, h / 2, 0),
    new THREE.Vector3(-w / 2, -h / 2, 0),
  ]);
  return new THREE.Line(g, hairMat());
}
function makeLabel(text, color, scale = 1) {
  const c = document.createElement("canvas");
  c.width = 512; c.height = 44;
  const g = c.getContext("2d");
  g.font = "500 24px Menlo, monospace";
  g.fillStyle = color; g.textBaseline = "middle";
  g.fillText(text.toUpperCase(), 4, 22);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sp.scale.set(24 * scale, 2.06 * scale, 1);
  sp.center.set(0, 0.5);
  return sp;
}
function setLabel(sp, text, color) {
  const c = sp.material.map.image;
  const g = c.getContext("2d");
  g.clearRect(0, 0, c.width, c.height);
  g.font = "500 24px Menlo, monospace";
  g.fillStyle = color; g.textBaseline = "middle";
  g.fillText(text.toUpperCase(), 4, 22);
  sp.material.map.needsUpdate = true;
}

const bootGroups = [];
function bootIn(obj, delay) { obj.visible = false; bootGroups.push({ obj, delay }); return obj; }

// ---- floor: translucent veil over the reflector ----
const veil = new THREE.Mesh(new THREE.PlaneGeometry(116, 56), new THREE.MeshBasicMaterial({ color: new THREE.Color("#15181b"), transparent: true, opacity: 0.78 }));
veil.rotation.x = -Math.PI / 2;
veil.position.y = -13.55;
scene.add(bootIn(veil, 0.0));
const pEdge = frameRect(116, 56);
pEdge.rotation.x = -Math.PI / 2; pEdge.position.y = -13.4;
scene.add(bootIn(pEdge, 0.1));
const grid = new THREE.GridHelper(800, 80, new THREE.Color(COL.dim), new THREE.Color(COL.dim));
grid.material.transparent = true; grid.material.opacity = 0.04; grid.position.y = -15;
scene.add(bootIn(grid, 0.0));

// ---- dust motes (cheap atmosphere) ----
const dustGeo = new THREE.BufferGeometry();
const DN = 500, dp = new Float32Array(DN * 3);
for (let i = 0; i < DN; i++) {
  dp[i * 3] = (Math.random() - 0.5) * 150;
  dp[i * 3 + 1] = -12 + Math.random() * 55;
  dp[i * 3 + 2] = (Math.random() - 0.5) * 100;
}
dustGeo.setAttribute("position", new THREE.BufferAttribute(dp, 3));
const dustTexC = document.createElement("canvas");
dustTexC.width = dustTexC.height = 32;
{
  const g = dustTexC.getContext("2d");
  const gr = g.createRadialGradient(16, 16, 0, 16, 16, 16);
  gr.addColorStop(0, "rgba(233,237,226,0.9)");
  gr.addColorStop(1, "rgba(233,237,226,0)");
  g.fillStyle = gr; g.fillRect(0, 0, 32, 32);
}
const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({
  map: new THREE.CanvasTexture(dustTexC), size: 0.9, transparent: true, opacity: 0.22,
  blending: THREE.AdditiveBlending, depthWrite: false,
}));
scene.add(bootIn(dust, 0.2));

// ---- seismograph wall with CRT shader screen ----
const WALL = { w: 64, h: 30, n: 110 };
const wall = new THREE.Group();
wall.position.set(0, 3.2, -16);
wall.rotation.x = -0.06;
scene.add(bootIn(wall, 0.5));
wall.add(frameRect(WALL.w, WALL.h));
const crt = new THREE.Mesh(
  new THREE.PlaneGeometry(WALL.w, WALL.h),
  new THREE.ShaderMaterial({
    transparent: true,
    uniforms: { uT: { value: 0 }, uZone: { value: new THREE.Color(COL.acc) }, uE: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `
      varying vec2 vUv;
      uniform float uT; uniform vec3 uZone; uniform float uE;
      float rnd(vec2 p){ return fract(sin(dot(p, vec2(12.9898,78.233)))*43758.5453); }
      void main(){
        vec3 col = vec3(0.063,0.075,0.086);
        float scan = smoothstep(0.35,0.65,abs(fract(vUv.y*90.0)-0.5));
        col -= scan*0.022;
        float n = (rnd(vUv*vec2(220.0,160.0)+fract(uT*0.37))-0.5)*0.028*(1.0+uE*2.0);
        col += n;
        float d = distance(vUv, vec2(0.5));
        col -= d*d*0.16;
        float edge = smoothstep(0.36,0.5,d);
        col += uZone * edge * (0.045 + uE*0.12);
        gl_FragColor = vec4(col, 0.94);
      }`,
  })
);
crt.position.z = -0.15;
wall.add(crt);
const laneH = WALL.h / 4;
for (let i = 1; i < 4; i++) {
  const y = -WALL.h / 2 + laneH * i;
  const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-WALL.w / 2, y, 0), new THREE.Vector3(WALL.w / 2, y, 0)]);
  wall.add(new THREE.Line(g, faintMat()));
}
for (let gx = 1; gx < 8; gx++) {
  const x = -WALL.w / 2 + (WALL.w / 8) * gx;
  const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x, -WALL.h / 2, 0), new THREE.Vector3(x, WALL.h / 2, 0)]);
  wall.add(new THREE.Line(g, faintMat()));
}
const laneLines = PROBES.map((_, i) => {
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(new Float32Array(WALL.n * 3), 3));
  g.setDrawRange(0, 0);
  const l = new THREE.Line(g, new THREE.LineBasicMaterial({ color: new THREE.Color(CH[i]), transparent: true, opacity: 0.95 }));
  l.frustumCulled = false;
  wall.add(l);
  return l;
});
const lossDots = PROBES.map(() => {
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(new Float32Array(WALL.n * 3), 3));
  g.setDrawRange(0, 0);
  const p = new THREE.Points(g, new THREE.PointsMaterial({ color: new THREE.Color(COL.alert), size: 0.9 }));
  p.frustumCulled = false;
  wall.add(p);
  return p;
});
const laneLabels = PROBES.map((p, i) => {
  const sp = makeLabel(`${p.name} ···`, CH[i], 0.62);
  sp.position.set(-WALL.w / 2 + 1, WALL.h / 2 - laneH * i - 2.4, 0.4);
  wall.add(sp);
  return sp;
});
const hdr = new THREE.Mesh(new THREE.PlaneGeometry(WALL.w, 2.6), new THREE.MeshBasicMaterial({ color: new THREE.Color("#1a1e22") }));
hdr.position.set(0, WALL.h / 2 + 1.3, -0.05);
wall.add(hdr);
const wallTitle = makeLabel("RTT CHANNELS · LIVE", COL.dim, 0.62);
wallTitle.position.set(-WALL.w / 2 + 1, WALL.h / 2 + 0.35, 0.1);
wall.add(wallTitle);
const clockSp = makeLabel("--:--:-- UTC", COL.ink, 0.62);
clockSp.position.set(WALL.w / 2 - 13.5, WALL.h / 2 + 0.35, 0.1);
wall.add(clockSp);
setInterval(() => setLabel(clockSp, new Date().toISOString().slice(11, 19) + " UTC", COL.ink), 1000);
const statusSp = makeLabel("STANDBY", COL.dim, 0.95);
statusSp.position.set(-WALL.w / 2, WALL.h / 2 + 3.6, 0);
wall.add(statusSp);
const timeLabels = [0, 1, 2, 3].map((k) => {
  const sp = makeLabel("--:--:--", COL.dim, 0.5);
  sp.position.set(-WALL.w / 2 + (WALL.w / 3) * k - (k === 3 ? 7 : 0), -WALL.h / 2 - 1.6, 0);

// ---- interaction: raycaster with click-vs-drag disambiguation ----
const ray = new THREE.Raycaster();
const ptr = new THREE.Vector2();
let downAt = 0, downX = 0, downY = 0;
function pick(e) {
  ptr.x = (e.clientX / innerWidth) * 2 - 1;
  ptr.y = -(e.clientY / innerHeight) * 2 + 1;
  ray.setFromCamera(ptr, cam);
  const hits = ray.intersectObjects(hitTargets, false);
  return hits.length ? hits[0].object.userData : null;
}
cv.addEventListener("pointermove", (e) => {
  if (dragging) return;
  cv.style.cursor = pick(e) ? "pointer" : "grab";
});
function activate(ud) {
  if (ud.action === "chan") {
    ctl.on[ud.i] = !ctl.on[ud.i];
    levers[ud.i].rotation.x = ctl.on[ud.i] ? -0.5 : 0.5;
  } else if (ud.action === "sim") {
    ctl.simUntil = Date.now() + 20000;
    events.unshift({ t: Date.now(), z: 1, e: +entropy.toFixed(2) });
  } else if (ud.action === "rate") {
    ctl.rate = (ctl.rate + 1) % 3;
    knob.rotation.y = [-0.7, 0, 0.7][ctl.rate];
    setLabel(rateLab, "RATE · " + ctl.rateNames[ctl.rate], COL.dim);
  }
  ui();
}

// ---- station updates ----
let laneCount = 0;
function rebuildStation() {
  const rounds = track.slice(-WALL.n);
  if (rounds.length < 2) return;
  laneCount = rounds.length;
  for (let li = 0; li < 4; li++) {
    const a = laneLines[li].geometry.attributes.position.array;
    const la = lossDots[li].geometry.attributes.position.array;
    let lossN = 0;
    const yMid = WALL.h / 2 - laneH * li - laneH / 2;
    const p = Math.max(stat[li].p50, 12);
    for (let k = 0; k < rounds.length; k++) {
      const x = -WALL.w / 2 + (k / (WALL.n - 1)) * WALL.w;
      const v = rounds[k].vals[li];
      const off = v === -1;
      const dev = v == null || off ? 0 : Math.max(-1, Math.min(1, (v - p) / p));
      a[k * 3] = x;
      a[k * 3 + 1] = yMid + dev * (laneH / 2 - 0.7);
      a[k * 3 + 2] = 0.2;
      if (v === null) {
        la[lossN * 3] = x; la[lossN * 3 + 1] = yMid - laneH / 2 + 0.8; la[lossN * 3 + 2] = 0.25;
        lossN++;
      }
    }
    laneLines[li].geometry.attributes.position.needsUpdate = true;
    laneLines[li].material.opacity = ctl.on[li] ? 0.95 : 0.18;
    lossDots[li].geometry.setDrawRange(0, lossN);
    lossDots[li].geometry.attributes.position.needsUpdate = true;
    setLabel(laneLabels[li], `${PROBES[li].name} ${!ctl.on[li] ? "OFF" : stat[li].win.length ? stat[li].p50.toFixed(0) + "ms ±" + stat[li].jit.toFixed(1) : "···"}`, CH[li]);
  }
  [0, 1, 2, 3].forEach((k) => {
    const idx = Math.floor((rounds.length - 1) * (k / 3));
    setLabel(timeLabels[k], hhmm(rounds[idx].t), COL.dim);
  });
  const z = zoneOf(entropy);
  setLabel(statusSp,
    simActive() ? "⚠ FAULT INJECTION ACTIVE" :
    z === 2 ? "▲ DEGRADATION LIKELY" : z === 1 ? "◆ ENTROPY RISING" : "● ALL SIGNALS NOMINAL",
    simActive() ? COL.warn : zoneCol(z));
  sweep.position.x = -WALL.w / 2 + ((rounds.length - 1) / (WALL.n - 1)) * WALL.w;
}

function resize() {
  renderer.setSize(innerWidth, innerHeight, false);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  cam.aspect = innerWidth / innerHeight; cam.updateProjectionMatrix();
  if (composer) composer.setSize(innerWidth, innerHeight);
}
addEventListener("resize", resize); resize();

let theta = 0.0, phi = 1.12, radius = 86, dragging = false, lastX = 0, lastY = 0;
cv.addEventListener("pointerdown", (e) => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  downAt = performance.now(); downX = e.clientX; downY = e.clientY;
});
addEventListener("pointerup", (e) => {
  dragging = false;
  if (performance.now() - downAt < 280 && Math.hypot(e.clientX - downX, e.clientY - downY) < 6) {
    const ud = pick(e);
    if (ud) activate(ud);
  }
});
addEventListener("pointermove", (e) => {
  if (!dragging) return;
  theta -= (e.clientX - lastX) * 0.0045;
  phi -= (e.clientY - lastY) * 0.003;
  theta = Math.max(-0.85, Math.min(0.85, theta));
  phi = Math.max(0.78, Math.min(1.38, phi));
  lastX = e.clientX; lastY = e.clientY;
});
cv.addEventListener("wheel", (e) => {
  e.preventDefault();
  radius = Math.max(50, Math.min(150, radius + e.deltaY * 0.1));
}, { passive: false });

// ---- boot + adaptive performance ----
const BOOT_MSGS = [
  [0.0, "INITIALIZING JITTERSCOPE STATION 01"],
  [0.9, "DEPLOYING PROBES · GH NPM CDN VRC"],
  [1.8, "CALIBRATING BASELINE · P50 WINDOW"],
  [2.7, "SHANNON ENGINE ONLINE · 12 BINS"],
  [3.6, "STATION ONLINE — MEASURING YOUR CONNECTION"],
];
const bootEl = document.getElementById("boot");
const ease = (x) => 1 - Math.pow(1 - Math.min(1, Math.max(0, x)), 3);
let fpsAcc = 0, fpsN = 0, degraded = false, lastFrame = performance.now();

let t = 0, bootT = 0;
function frame() {
  const now = performance.now();
  const dt = now - lastFrame; lastFrame = now;
  t += 0.016; bootT += 0.016;
  if (dirty) { rebuildStation(); dirty = false; }

  if (bootT > 4.5 && !degraded) {
    fpsAcc += dt; fpsN++;
    if (fpsN >= 90) {
      if (fpsAcc / fpsN > 38) { // < ~26fps → degrade gracefully
        degraded = true;
        if (reflector) reflector.visible = false;
        dust.visible = false;
        renderer.setPixelRatio(1);
        if (bloomPass) bloomPass.strength = 0.3;
      } else degraded = true;
    }
  }

  for (const m of BOOT_MSGS) if (bootT >= m[0] && bootT < m[0] + 0.95) bootEl.textContent = m[1];
  for (const b of bootGroups) {
    if (!b.obj.visible && bootT > b.delay) b.obj.visible = true;
  }
  const reveal = ease((bootT - 1.0) / 1.6);
  laneLines.forEach((l) => l.geometry.setDrawRange(0, Math.floor(laneCount * reveal)));

  const z = zoneOf(entropy);
  const zc = new THREE.Color(simActive() ? COL.warn : zoneCol(z));
  crt.material.uniforms.uT.value = t;
  crt.material.uniforms.uZone.value = zc;
  crt.material.uniforms.uE.value = entropy;

  const n = recent.length || 1;
  const baseBin = Math.floor(((1.0 - 0.6) / 1.2) * BINS);
  for (let b = 0; b < BINS; b++) {
    const target = Math.min(HH - 1.5, Math.max(0.06, (liveHist[b] / n) * 34));
    const m = bars[b];
    m.scale.y += (target - m.scale.y) * 0.12;
    m.position.y = m.scale.y / 2;
    const dist = Math.abs(b - baseBin);
    const danger = dist <= 1 ? COL.acc : dist <= 3 ? COL.warn : COL.alert;
    m.material.color.lerp(new THREE.Color(danger), 0.1);
    m.material.opacity = liveHist[b] > 0 ? 0.92 : 0.18;
  }
  const eh = Math.max(0.05, entropy * COLH);
  colFill.scale.y += (eh - colFill.scale.y) * 0.15;
  colFill.position.y = colFill.scale.y / 2;
  colFill.material.color.lerp(zc, 0.12);
  setLabel(colVal, entropy.toFixed(2).slice(1), simActive() ? COL.warn : zoneCol(z));

  leds.forEach((led, i) => {
    const on = ctl.on[i];
    const lost = stat[i].lastLost;
    led.material.color.set(!on ? "#3a3f44" : lost ? COL.alert : CH[i]);
    led.scale.setScalar(on && !lost ? 1 + Math.sin(t * 2.4 + i) * 0.06 : on ? 0.8 + Math.abs(Math.sin(t * 6)) * 0.35 : 0.7);
  });
  simBtn.position.y = simActive() ? 0.18 + Math.abs(Math.sin(t * 7)) * 0.1 : 0.35;
  simBtn.material.color.set(simActive() ? COL.warn : COL.alert);
  dust.rotation.y = t * 0.008;
  sweep.material.opacity = 0.3 + Math.sin(t * 4) * 0.2;
  if (bloomPass && !degraded) bloomPass.strength = 0.4 + entropy * 0.5 + Math.sin(t * 1.7) * 0.04;

  const intro = ease(bootT / 3.2);
  const r = 230 - (230 - radius) * intro;
  const ph = 0.7 + (phi - 0.7) * intro;
  const th = -1.1 + (theta + 1.1) * intro;
  const sway = Math.sin(t * 0.25) * 0.025 * intro;
  const shake = z === 2 ? (Math.random() - 0.5) * 0.6 : 0;
  cam.position.set(
    Math.sin(th + sway) * Math.sin(ph) * r + shake,
    Math.cos(ph) * r * 0.85,
    Math.cos(th + sway) * Math.sin(ph) * r + shake * 0.5
  );
  cam.lookAt(0, 1.5, -4);
  try {
    if (composer) composer.render(); else renderer.render(scene, cam);
  } catch { composer = null; renderer.render(scene, cam); }
  requestAnimationFrame(frame);
}
frame();
