<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="'Courier New',ui-monospace,monospace">
  <rect width="1200" height="300" fill="#e7e4dd"/>

  <!-- crop marks (único ornamento, sutil) -->
  <g stroke="#0a0a0a" stroke-width="2">
    <line x1="16" y1="16" x2="42" y2="16"/><line x1="16" y1="16" x2="16" y2="42"/>
    <line x1="1184" y1="16" x2="1158" y2="16"/><line x1="1184" y1="16" x2="1184" y2="42"/>
    <line x1="16" y1="284" x2="42" y2="284"/><line x1="16" y1="284" x2="16" y2="258"/>
    <line x1="1184" y1="284" x2="1158" y2="284"/><line x1="1184" y1="284" x2="1184" y2="258"/>
  </g>

  <!-- meta line: rol (izq) · lugar/año (der) -->
  <text x="64" y="72" font-size="13" letter-spacing="4" fill="#0a0a0a" fill-opacity="0.55">SOFTWARE DEVELOPER</text>
  <text x="1136" y="72" font-size="13" letter-spacing="3" fill="#0a0a0a" fill-opacity="0.55" text-anchor="end">BUENOS AIRES — 2026</text>

  <!-- foco: el nombre, con aire alrededor -->
  <text x="60" y="190" font-size="78" font-weight="700" letter-spacing="-2" fill="#0a0a0a">NICOLAS STEFONI</text>
  <rect x="828" y="163" width="30" height="30" fill="#0a0a0a"><animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/></rect>

  <!-- hairline -->
  <line x1="62" y1="220" x2="1138" y2="220" stroke="#0a0a0a" stroke-width="1.5"/>

  <!-- pie justificado -->
  <text x="64" y="250" font-size="13" letter-spacing="4" fill="#0a0a0a" fill-opacity="0.7">MOBILE · WEB · END—TO—END</text>
  <text x="1136" y="250" font-size="13" letter-spacing="4" fill="#0a0a0a" fill-opacity="0.55" text-anchor="end">MOUNTAINS IN BETWEEN</text>
</svg>
