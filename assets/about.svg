  <text x="84" y="62" font-size="15" letter-spacing="4" fill="#ededed">01 / ABOUT</text>
  <line x1="64" y1="78" x2="1136" y2="78" stroke="#2f343b" stroke-width="1.5"/>
  <text x="64" y="104" font-size="17" fill="#ededed" xml:space="preserve">Software developer. I build products end to end —</text><text x="64" y="133" font-size="17" fill="#ededed" xml:space="preserve">mobile (React Native · Expo) and web (Next.js).</text><text x="64" y="162" font-size="17" fill="#ededed" xml:space="preserve">Clean architecture, thoughtful DX, and frontend</text><text x="64" y="191" font-size="17" fill="#ededed" xml:space="preserve">that feels good to use. Dev tooling &amp; AI on the</text><text x="64" y="220" font-size="17" fill="#ededed" xml:space="preserve">side. Mountaineer off-keyboard.</text><text x="64" y="278" font-size="17" fill="#7d828c" xml:space="preserve">ES · Desarrollador de software. Producto de punta</text><text x="64" y="307" font-size="17" fill="#7d828c" xml:space="preserve">a punta — mobile y web. Arquitectura limpia, buena</text><text x="64" y="336" font-size="17" fill="#7d828c" xml:space="preserve">DX y un frontend que se siente bien de usar.</text>
</svg>