<text x="48" y="94" font-family="ui-monospace,'SF Mono','Cascadia Mono','JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="13" font-weight="400" letter-spacing="1.2" fill="#ede8dc" text-anchor="start">I ship product end to end — mobile (React Native · Expo)</text><text x="48" y="116" font-family="ui-monospace,'SF Mono','Cascadia Mono','JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="13" font-weight="400" letter-spacing="1.2" fill="#ede8dc" text-anchor="start">and web (Next.js). Clean architecture, sharp DX, and UI</text><text x="48" y="138" font-family="ui-monospace,'SF Mono','Cascadia Mono','JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="13" font-weight="400" letter-spacing="1.2" fill="#ede8dc" text-anchor="start">that just works. I build developer tooling and explore AI.</text><text x="48" y="160" font-family="ui-monospace,'SF Mono','Cascadia Mono','JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="13" font-weight="400" letter-spacing="1.2" fill="#ede8dc" text-anchor="start">Mountaineer off-keyboard.</text><text x="48" y="192" font-family="ui-monospace,'SF Mono','Cascadia Mono','JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="12" font-weight="400" letter-spacing="1.2" fill="#93a0a8" text-anchor="start">ES · Producto de punta a punta — mobile y web.</text><text x="48" y="212" font-family="ui-monospace,'SF Mono','Cascadia Mono','JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="12" font-weight="400" letter-spacing="1.2" fill="#93a0a8" text-anchor="start">Arquitectura limpia, buena DX, UI que funciona.</text><text x="48" y="232" font-family="ui-monospace,'SF Mono','Cascadia Mono','JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="12" font-weight="400" letter-spacing="1.2" fill="#93a0a8" text-anchor="start">Construyo tooling y exploro IA. Montañista.</text><rect x="384.8" y="222" width="7" height="12" fill="#e8893c"><animate attributeName="opacity" values="1;1;0;0" dur="1.15s" repeatCount="indefinite"/></rect>
