  <!-- name + tagline -->
  <text x="600" y="172" text-anchor="middle" font-size="80" font-weight="700" fill="url(#shimmer)" filter="url(#glow)" letter-spacing="2">Nicolas Stefoni</text>
  <text x="600" y="212" text-anchor="middle" font-size="20" fill="#aebfd4" letter-spacing="4">software developer&#160;&#160;·&#160;&#160;mobile&#160;·&#160;web&#160;&#160;·&#160;&#160;mountains in between</text>
