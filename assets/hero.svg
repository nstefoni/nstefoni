<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" font-family="'Trebuchet MS','Segoe UI',Verdana,sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070b1c"><animate attributeName="stop-color" values="#070b1c;#0d1430;#0a1326;#070b1c" dur="20s" repeatCount="indefinite"/></stop>
      <stop offset="55%" stop-color="#142a52"><animate attributeName="stop-color" values="#142a52;#1c3a64;#173a4a;#142a52" dur="20s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#091a29"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5eead4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7fd1e8"/><stop offset="45%" stop-color="#f4fbff"/>
      <stop offset="55%" stop-color="#f4fbff"/><stop offset="100%" stop-color="#7fd1e8"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="42%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="peakGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cfeefe" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#cfeefe" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="360" fill="url(#sky)"/>

  <g filter="url(#soft)">
    <path d="M0 110 Q300 60 600 100 T1200 95 V150 Q900 115 600 150 T0 160 Z" fill="url(#aurora)" opacity="0.5">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="11s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;-40 8;0 0" dur="24s" repeatCount="indefinite"/>
    </path>
  </g>

  <g fill="#e6eeff">
    <circle cx="120" cy="48" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="38" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="52" r="1.4"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="40" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="55" r="1.3"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="44" r="1"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- mountains -->
  <polygon points="0,300 180,175 320,250 470,150 640,260 820,165 1000,250 1200,185 1200,360 0,360" fill="#1b3454" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0 0;16 0;0 0" dur="28s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="0,360 140,245 300,305 480,215 680,315 880,235 1080,305 1200,255 1200,360" fill="#122236"/>
  <polygon points="0,360 220,245 360,300 560,228 760,300 980,245 1200,300 1200,360" fill="#0a1422"/>
  <!-- peak glow + snow caps -->
  <circle cx="470" cy="150" r="46" fill="url(#peakGlow)"/>
  <polygon points="430,178 470,150 510,178 488,168 470,160 450,168" fill="#eaf6ff"/>
  <polygon points="600,250 640,228 678,250 656,242 640,236 620,242" fill="#dff0fe" opacity="0.9"/>
  <polygon points="180,196 220,168 252,196 232,186 220,180 200,186" fill="#dff0fe" opacity="0.85"/>

